services:
  pi-info:
    build: .
    container_name: pi-info
    restart: unless-stopped
    # ホストの実ネットワークカウンタ(eth0/wlan0 等)をそのまま取得するため host ネットワークを使用。
    network_mode: host
    environment:
      # バインド先とポートは .env で設定（未設定なら localhost:8001）。.env.example 参照。
      - HOST=${PI_INFO_HOST:-127.0.0.1}
      - PORT=${PI_INFO_PORT:-8001}
    volumes:
      # ラズパイの CPU 温度取得用（読み取り専用）
      - /sys/class/thermal:/sys/class/thermal:ro
